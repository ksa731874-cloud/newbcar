; PHP Configuration for Railway
; This file enables required PHP extensions on Railway

; Required Extensions
extension=pdo
extension=pdo_mysql
extension=mysqli
extension=mbstring
extension=json
extension=curl
extension=openssl

; PHP Settings
memory_limit = 256M
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 300
max_input_time = 300

; Error Reporting (disable in production)
display_errors = On
error_reporting = E_ALL
