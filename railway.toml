[railway]
entrypoint = "php"

[nixpacks]
PHP_VERSION = "82"
PHP_EXTENSIONS = "pdo_mysql mysqli"

[deploy]
buildCommand = "composer install --no-dev --optimize-autoloader"
startCommand = "php -S 0.0.0.0:$PORT -t ."
healthcheckPath = "/"
healthcheckPeriod = "10s"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
